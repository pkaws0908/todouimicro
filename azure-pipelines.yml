trigger: none

pool: bkagentlinux

stages:
- stage: buildStage
  jobs:
  - job: buildJob
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: 'docker-acr'
        repository: 'MicroTodoUI'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
- stage: DeployStage
  jobs:
  - job: DeployJob
    steps:
    - task: KubernetesManifest@1
      inputs:
        action: 'deploy'
        connectionType: 'kubernetesServiceConnection'
        kubernetesServiceConnection: 'humara-aks'
        namespace: 'bipin'
        manifests: 'mainefests/*.yaml'
